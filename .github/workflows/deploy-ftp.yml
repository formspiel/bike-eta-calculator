name: Minify and Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Minify and FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version
        run: |
          VERSION="v1.$(git rev-list --count HEAD) ($(git rev-parse --short HEAD))"
          sed -i "s/__VERSION__/$VERSION/" index.html

      - name: Minify
        run: npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true index.html -o index.html

      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            **/*.md
            .gitignore
          log-level: verbose
          dry-run: false
