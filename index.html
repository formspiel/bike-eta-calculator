<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ETA">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111111">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ETA+Calculator%22,%22short_name%22:%22ETA%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5f5f5%22,%22theme_color%22:%22%230a84ff%22,%22start_url%22:%22.%22}">
<title>ETA Calculator</title>
<style>
  :root {
    --fs-body:    1rem;
    --fs-label:   0.8125rem;
    --fs-title:   1.25rem;
    --fs-caption: 0.75rem;
    --bg:         #f5f5f5;
    --surface:    #ffffff;
    --border:     #d1d1d6;
    --text:       #1c1c1e;
    --text-sec:   #6c6c70;
    --accent:     #0a84ff;
    --row-alt:    #f2f2f7;
    --row-hi-bg:  #0a84ff;
    --row-hi-fg:  #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #111111;
      --surface:   #1c1c1e;
      --border:    #38383a;
      --text:      #f2f2f7;
      --text-sec:  #8e8e93;
      --row-alt:   #2c2c2e;
      --row-hi-bg: #0a5fcb;
    }
  }

  html { font-size: 100%; }
  @supports (font: -apple-system-body) {
    html { font: -apple-system-body; }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: var(--fs-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 1rem) env(safe-area-inset-left, 0);
    min-height: 100dvh;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0;
    margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  header {
    padding: 0.75rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  header h1 { flex: 1; font-size: var(--fs-title); font-weight: 700; letter-spacing: -0.01em; }

  #clock { font-size: var(--fs-label); color: var(--text-sec); font-variant-numeric: tabular-nums; }

  #lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0.25rem 0.5rem;
    font-size: var(--fs-caption);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
  }
  #lang-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  main { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  legend {
    font-size: var(--fs-label);
    font-weight: 600;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 0.25rem;
  }
  .field { display: flex; align-items: center; gap: 0.5rem; }
  label { flex: 1; font-size: var(--fs-body); }
  .unit { font-size: var(--fs-label); color: var(--text-sec); white-space: nowrap; width: 2.75rem; display: inline-block; }

  input[type="text"] {
    width: 6rem;
    padding: 0.375rem 0.5rem;
    font-size: var(--fs-body);
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    text-align: right;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Consistent "legend on top" for all cards */
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem 0.875rem;
    margin-top: 0.5rem; /* room for the floating label */
  }
  .card-label {
    position: absolute;
    top: -0.55rem;
    left: 0.75rem;
    background: var(--surface);
    padding: 0 0.25rem;
    font-size: var(--fs-label);
    font-weight: 600;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .result-value {
    font-size: clamp(1.5rem, 7vw, 2rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-top: 0.25rem;
  }

  /* Table inside card: remove top padding, let label breathe */
  .card table { margin-top: 0.25rem; }

  table { width: 100%; border-collapse: collapse; font-size: var(--fs-label); font-variant-numeric: tabular-nums; }
  th {
    text-align: left;
    padding: 0.375rem 0.5rem 0.375rem 1rem;
    background: var(--row-alt);
    font-weight: 600;
    font-size: var(--fs-caption);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-sec);
  }
  td { padding: 0.4rem 0.5rem 0.4rem 1rem; border-top: 1px solid var(--border); vertical-align: middle; }
  td:last-child { padding-right: 0.75rem; text-align: right; }
  tr:nth-child(even) td { background: var(--row-alt); }
  tr.current-row td { background: var(--row-hi-bg); color: var(--row-hi-fg); font-weight: 700; }

  .use-btn {
    background: none;
    border: 1px solid var(--accent);
    border-radius: 5px;
    color: var(--accent);
    padding: 0.2rem 0.45rem;
    font-size: var(--fs-caption);
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.3;
  }
  tr.current-row .use-btn { border-color: var(--row-hi-fg); color: var(--row-hi-fg); }
  .use-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .use-btn:active { opacity: 0.7; }

  #summary-text { line-height: 1.5; margin-top: 0.25rem; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }

  .btn-primary {
    align-self: flex-start;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1.125rem;
    font-size: var(--fs-body);
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .btn-primary:active { opacity: 0.8; }

  .empty { font-size: var(--fs-body); color: var(--text-sec); }
  /* emoji stays upright, only the text is italic */
  .empty .empty-text { font-style: italic; }
  /* empty cell inside table must not inherit td:last-child alignment */
  td.empty { text-align: left; color: var(--text-sec); padding-left: 1rem; }
</style>
</head>
<body>

<header>
  <h1 data-i18n="title">ETA Calculator</h1>
  <div id="clock"></div>
  <button id="lang-btn" type="button">DE</button>
</header>

<main>
  <fieldset>
    <legend data-i18n="journey">Journey</legend>
    <div class="field">
      <label for="speed" data-i18n="speed">Avg speed</label>
      <input type="text" id="speed" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" placeholder="0" autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="unit" aria-hidden="true">km/h</span>
    </div>
    <div class="field">
      <label for="km" data-i18n="distance">Distance left</label>
      <input type="text" id="km" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" placeholder="0" autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="unit" aria-hidden="true">km</span>
    </div>
  </fieldset>

  <div class="card" role="region" id="eta-region">
    <div class="card-label" data-i18n="eta" aria-hidden="true">ETA</div>
    <div class="result-value" id="eta-display" aria-live="polite">–</div>
  </div>

  <div class="card" role="region" id="table-region" style="padding:0.75rem 0 0;">
    <div class="card-label" data-i18n="etaBySpeed" aria-hidden="true">ETA by speed</div>
    <table style="margin-top:0.5rem;">
      <thead>
        <tr>
          <th scope="col" data-i18n="thSpeed">Speed (km/h)</th>
          <th scope="col" data-i18n="thEta">ETA</th>
          <th scope="col" data-i18n="thDur">Travel time</th>
          <th scope="col"><span class="sr-only" data-i18n="thUse">Use</span></th>
        </tr>
      </thead>
      <tbody id="eta-table">
        <tr><td colspan="4" class="empty" data-i18n="empty">ℹ️ <span class="empty-text">Enter speed &amp; distance above</span></td></tr>
      </tbody>
    </table>
  </div>

  <div class="card" role="region" id="sms-region" style="display:flex;flex-direction:column;">
    <div class="card-label" data-i18n="smsLabel" aria-hidden="true">Text message summary</div>
    <p id="summary-text" class="empty" data-i18n="smsEmpty" aria-live="polite">ℹ️ <span class="empty-text">Enter speed &amp; distance to generate.</span></p>
    <div class="btn-row">
      <button id="share-btn" class="btn-primary" data-i18n="share" style="display:none" type="button">Share</button>
      <button id="copy-btn" class="btn-primary" data-i18n="copy" style="display:none" type="button">Copy</button>
    </div>
  </div>
</main>

<script>
(function () {
  'use strict';

  // ── Strings ────────────────────────────────────────────
  var S = {
    en: {
      title: 'ETA Calculator', journey: 'Journey', speed: 'Avg speed',
      distance: 'Distance left', eta: 'ETA', etaBySpeed: 'ETA by speed',
      thSpeed: 'Speed (km/h)', thEta: 'ETA', thDur: 'Travel time', thUse: 'Use',
      empty: 'ℹ️ <span class="empty-text">Enter speed &amp; distance above</span>',
      smsLabel: 'Text message summary', smsEmpty: 'ℹ️ <span class="empty-text">Enter speed &amp; distance to generate.</span>',
      copy: 'Copy', copied: 'Copied!', useRow: 'Use', share: 'Share',
      clockLabel: 'Current time', etaLabel: 'ETA', tableLabel: 'ETA by speed',
      smsRegionLabel: 'Text message summary', langSwitch: 'Zu Deutsch wechseln',
      summary: function (s, km, t, now) {
        return 'Based on my current average speed of ' + s + '\u202fkm/h and ' +
               km + '\u202fkm remaining, I will probably arrive at ' + t +
               ' (as of\u202f' + now + ').';
      }
    },
    de: {
      title: 'Ankunftszeit', journey: 'Fahrt', speed: '\u00d8 Geschw.',
      distance: 'Verbleibende km', eta: 'Ankunft', etaBySpeed: 'Ankunft nach Tempo',
      thSpeed: 'Tempo (km/h)', thEta: 'Ankunft', thDur: 'Fahrzeit', thUse: 'Verwenden',
      empty: 'ℹ️ <span class="empty-text">Tempo und Distanz eingeben</span>',
      smsLabel: 'SMS-Zusammenfassung', smsEmpty: 'ℹ️ <span class="empty-text">Tempo und Distanz eingeben.</span>',
      copy: 'Kopieren', copied: 'Kopiert!', useRow: '\u00dcbern.', share: 'Teilen',
      clockLabel: 'Aktuelle Uhrzeit', etaLabel: 'Ankunftszeit', tableLabel: 'Ankunft nach Tempo',
      smsRegionLabel: 'SMS-Zusammenfassung', langSwitch: 'Switch to English',
      summary: function (s, km, t, now) {
        return 'Bei meiner aktuellen Durchschnittsgeschwindigkeit von ' + s +
               '\u202fkm/h und noch ' + km + '\u202fkm werde ich voraussichtlich um ' + t +
               '\u202fUhr ankommen (berechnet\u202f' + now + '\u202fUhr).';
      }
    }
  };

  var lang = 'en';

  function s(key) { return S[lang][key]; }

  function applyLang() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var v = S[lang][el.getAttribute('data-i18n')];
      if (typeof v === 'string') {
        if (v.indexOf('<') !== -1) { el.innerHTML = v; } else { el.textContent = v; }
      }
    });
    document.getElementById('clock').setAttribute('aria-label', s('clockLabel'));
    document.getElementById('eta-region').setAttribute('aria-label', s('etaLabel'));
    document.getElementById('table-region').setAttribute('aria-label', s('tableLabel'));
    document.getElementById('sms-region').setAttribute('aria-label', s('smsRegionLabel'));
    var lb = document.getElementById('lang-btn');
    lb.textContent = lang === 'en' ? 'DE' : 'EN';
    lb.setAttribute('aria-label', s('langSwitch'));
    update();
  }

  document.getElementById('lang-btn').addEventListener('click', function () {
    lang = lang === 'en' ? 'de' : 'en';
    applyLang();
  });

  // ── Clock ──────────────────────────────────────────────
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function fmt(d)  { return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
  function fmts(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }

  var clockEl = document.getElementById('clock');
  function tick() { clockEl.textContent = fmt(new Date()); }
  tick();
  setInterval(tick, 1000);

  // ── Calc ───────────────────────────────────────────────
  var speedEl  = document.getElementById('speed');
  var kmEl     = document.getElementById('km');
  var etaEl    = document.getElementById('eta-display');
  var tableEl  = document.getElementById('eta-table');
  var summEl   = document.getElementById('summary-text');
  var shareBtn = document.getElementById('share-btn');
  var copyBtn  = document.getElementById('copy-btn');
  var canShare = !!navigator.share;
  var canCopy  = !!(navigator.clipboard && navigator.clipboard.writeText);

  function arrival(spd, km) { return new Date(Date.now() + Math.round(km / spd * 3600000)); }

  function dur(hours) {
    var m = Math.round(hours * 60), h = Math.floor(m / 60);
    return h ? h + 'h\u202f' + pad(m % 60) + 'm' : m + '\u202fmin';
  }

  function setSummary(spd, km, arr) {
    summEl.textContent     = s('summary')(spd.toFixed(1), km.toFixed(1), fmts(arr), fmts(new Date()));
    summEl.className       = '';
    shareBtn.style.display = canShare ? 'inline-block' : 'none';
    shareBtn.textContent   = s('share');
    copyBtn.style.display  = (!canShare && canCopy) ? 'inline-block' : 'none';
    copyBtn.textContent    = s('copy');
  }

  function update() {
    var spd = parseVal(speedEl);
    var km  = parseVal(kmEl);

    if (!spd || !km || spd <= 0 || km <= 0) {
      etaEl.textContent      = '\u2013';
      tableEl.innerHTML      = '<tr><td colspan="4" class="empty">' + s('empty') + '</td></tr>';
      summEl.innerHTML       = s('smsEmpty');
      summEl.className       = 'empty';
      shareBtn.style.display = 'none';
      copyBtn.style.display  = 'none';
      return;
    }

    var arr = arrival(spd, km);
    etaEl.textContent = fmts(arr);

    var rows = '';
    for (var i = -3; i <= 3; i++) {
      var sv  = Math.round((spd + i * 0.3) * 10) / 10;
      if (sv <= 0) continue;
      var cls = i === 0 ? ' class="current-row"' : '';
      rows += '<tr' + cls + '>' +
              '<td>' + sv.toFixed(1) + '</td>' +
              '<td>' + fmts(arrival(sv, km)) + '</td>' +
              '<td>' + dur(km / sv) + '</td>' +
              '<td><button class="use-btn" type="button" data-s="' + sv.toFixed(1) + '">' + s('useRow') + '</button></td>' +
              '</tr>';
    }
    tableEl.innerHTML = rows;

    setSummary(spd, km, arr);
  }

  tableEl.addEventListener('click', function (e) {
    var btn = e.target.closest('.use-btn');
    if (!btn) return;
    speedEl.value = btn.getAttribute('data-s');
    update();
  });

  function parseVal(el) {
    return parseFloat(el.value.replace(',', '.'));
  }

  speedEl.addEventListener('input', update);
  kmEl.addEventListener('input', update);

  // ── Share / Copy ───────────────────────────────────────
  shareBtn.addEventListener('click', function () {
    var txt = summEl.textContent;
    if (!txt || !navigator.share) return;
    navigator.share({ text: txt }).catch(function () {});
  });

  copyBtn.addEventListener('click', function () {
    var txt = summEl.textContent;
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(function () {
      copyBtn.textContent = s('copied');
      setTimeout(function () { copyBtn.textContent = s('copy'); }, 2000);
    }).catch(function () {});
  });

  // Init
  applyLang();
})();
</script>
</body>
</html>
